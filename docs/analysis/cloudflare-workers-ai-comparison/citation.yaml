benchmark_caveats:
  - >-
    SWE-Bench / LiveCodeBench scores are not interchangeable across harnesses (OpenHands vs OpenCode vs vendor-internal tooling).
  - >-
    Workers AI may serve quantized or throughput-optimized variants; latency and exact behavior can differ from self-hosted reference weights.
  - >-
    Closed APIs (Claude, Gemini, GPT-5.x) move faster than public leaderboards; treat vendor tables as snapshots, not ordinals for all tasks.
