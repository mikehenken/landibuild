model_id_verification:
  note: >
    Canonical Workers AI IDs use the @cf/{vendor}/{model} prefix as listed on each model page
    and in the official pricing table (workers-ai-pricing). Slugs without @cf/ (e.g.
    moonshotai/kimi-k2.5) are vendor/repo-style names; on Cloudflare they map to @cf/moonshotai/kimi-k2.5, etc.
